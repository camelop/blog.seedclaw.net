name: Documentation
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install zensical

      # Two independent builds — one per language
      - run: zensical build -f zensical.toml --clean
      - run: zensical build -f zensical.zh.toml

      # Root redirect → /en/ by default
      - name: Generate root landing page
        run: |
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=en/">
            <title>SeedClaw</title>
          </head>
          <body>
            <p><a href="en/">English</a> · <a href="zh/">中文</a></p>
          </body>
          </html>
          HTML

      - name: Disallow all crawlers (polite layer)
        run: |
          printf 'User-agent: *\nDisallow: /\n' > site/robots.txt

      # TODO: uncomment to re-enable staticrypt encryption
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      # - run: npm install -g staticrypt
      # - name: Encrypt HTML with site password
      #   env:
      #     STATICRYPT_PASSWORD: ${{ secrets.NAIVE_ACCESS_PASSWD }}
      #   run: staticrypt site/* -r -d site --short --remember 365

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
