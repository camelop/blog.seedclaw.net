# Chinese build — mirrors zensical.toml with zh-specific overrides.
# Shared theme/feature settings are duplicated so each build is
# self-contained (TOML has no include mechanism).

[project]
site_name = "SeedClaw"
site_description = "SeedClaw — AI Agent 构建教程"
site_url = "https://blog.seedclaw.net/zh/"
docs_dir = "docs/zh"
site_dir = "site/zh"
copyright = """
Copyright &copy; 2026 SeedClaw
"""

nav = [
  { "首页" = "index.md" },
  { "序章" = "preface.md" },
]

[project.theme]
language = "zh"
custom_dir = "overrides"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "切换至深色模式"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "切换至浅色模式"

[project.extra]
alternate = [
  { name = "English", link = "/en/", lang = "en" },
  { name = "中文", link = "/zh/", lang = "zh" },
]
